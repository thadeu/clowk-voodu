# YAML equivalent of examples/fullstack/deployment.hcl. Scoped kinds
# (`deployment`, `ingress`) require `scope` — the organizational tag that
# groups manifests and defines the uniqueness boundary for names. See the
# HCL version for the full semantics walkthrough.
---
kind: deployment
scope: clowk
name: api
spec:
  image: ghcr.io/clowk/api:${VERSION:-latest}
  replicas: 2
  env:
    PORT: "8080"
    DATABASE: postgres://main:5432/app
  ports:
    - "8080"
  restart: always
  health_check: /healthz
---
kind: database
name: main
spec:
  engine: postgres
  version: "16"
  storage: 20Gi
  backup:
    schedule: "0 3 * * *"
    retention: 14d
    target: s3://clowk-backups/voodu/main
  params:
    max_connections: "200"
    shared_buffers: 512MB
---
kind: ingress
scope: clowk
name: api
spec:
  host: api.clowk.in
  # `service` omitted — defaults to the ingress name ("api"). Set it
  # explicitly only for cross-app routing (ingress "public" → service
  # "api"). Use `locations` (list of {path, strip}) for path-based
  # routing; omit for a catch-all on the host.
  port: 8080
  tls:
    enabled: true
    provider: letsencrypt
    email: ops@clowk.in
