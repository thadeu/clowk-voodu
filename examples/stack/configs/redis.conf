# Minimal redis.conf for the stack example.
# Mounted at /etc/redis/redis.conf inside the container.
# Redis reads it via `redis-server /etc/redis/redis.conf`.

# --- Network -------------------------------------------------------------

bind 0.0.0.0
port 6379
tcp-keepalive 60

# --- Persistence ---------------------------------------------------------

# AOF on — durability across restarts. The `data` volume
# claim mounted at /data carries the AOF and snapshot files.
appendonly yes
appendfsync everysec
dir /data

# --- Memory --------------------------------------------------------------

maxmemory 512mb
maxmemory-policy allkeys-lru

# --- Auth / ACL ----------------------------------------------------------

# Reads users from the ACL file mounted alongside this conf.
# users.acl is the second key of the redis-config asset.
aclfile /etc/redis/users.acl

# --- Logging -------------------------------------------------------------

loglevel notice
logfile ""

# --- Slow log ------------------------------------------------------------

slowlog-log-slower-than 10000
slowlog-max-len 128
