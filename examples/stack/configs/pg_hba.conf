# Host-based auth for the stack example.
# Mounted at /etc/postgresql/pg_hba.conf inside the container.
#
# voodu0 is the docker bridge voodu attaches every workload
# to — anything on 172.x in this file is for that bridge.
# Tighten / loosen as your network demands.

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local socket (postgres-internal)
local   all             all                                     trust

# Loopback (host networking, debug)
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# voodu0 bridge — any container on the same network can dial
# postgres with the password set via `vd config set`.
host    all             all             172.16.0.0/12           scram-sha-256

# Reject everything else explicitly.
host    all             all             0.0.0.0/0               reject
host    all             all             ::/0                    reject
